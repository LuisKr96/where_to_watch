<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WhereToWatch — Football TV Guide</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="app">

    <!-- Header -->
    <header class="hero">
      <div class="hero-inner">
        <div class="logo">
          <div class="logo-icon">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
              <circle cx="10" cy="10" r="9" stroke="#22c55e" stroke-width="1.5"/>
              <path d="M10 1 C10 1 7 5 10 10 C13 15 10 19 10 19" stroke="#22c55e" stroke-width="1.2" fill="none"/>
              <path d="M1 10 L19 10" stroke="#22c55e" stroke-width="1.2"/>
              <path d="M2 6 C5 7 8 7 10 7 C12 7 15 7 18 6" stroke="#22c55e" stroke-width="1" fill="none"/>
              <path d="M2 14 C5 13 8 13 10 13 C12 13 15 13 18 14" stroke="#22c55e" stroke-width="1" fill="none"/>
            </svg>
          </div>
          <span class="logo-text">where<em>to</em>watch</span>
        </div>
        <div class="hero-copy">
          <h1>Find every match,<br>on every screen.</h1>
          <p>Select your country to see what channel each game is on.</p>
        </div>
      </div>
    </header>

    <!-- Filters -->
    <div class="filters">
      <div class="filter-row">
        <div class="select-wrap">
          <label for="country-select">Country</label>
          <select id="country-select">
            <option value="">Select country...</option>
            <option value="england">🏴󠁧󠁢󠁥󠁮󠁧󠁿 England</option>
            <option value="germany">🇩🇪 Germany</option>
            <option value="spain">🇪🇸 Spain</option>
            <option value="italy">🇮🇹 Italy</option>
            <option value="france">🇫🇷 France</option>
            <option value="usa">🇺🇸 United States</option>
            <option value="australia">🇦🇺 Australia</option>
            <option value="ireland">🇮🇪 Ireland</option>
          </select>
        </div>
        <div class="select-wrap">
          <label for="comp-select">Competition</label>
          <select id="comp-select">
            <option value="all">All competitions</option>
            <option value="pl">Premier League</option>
            <option value="ucl">Champions League</option>
            <option value="laliga">La Liga</option>
            <option value="bundesliga">Bundesliga</option>
            <option value="seriea">Serie A</option>
            <option value="intl">Internationals</option>
          </select>
        </div>
      </div>
      <div class="date-nav">
        <button class="date-btn" id="prev-date" aria-label="Previous day">&#8249;</button>
        <span class="date-label" id="date-label">Today</span>
        <button class="date-btn" id="next-date" aria-label="Next day">&#8250;</button>
      </div>
    </div>

    <!-- Main content -->
    <main class="content" id="content">
      <div class="empty-state" id="empty-state">
        <div class="empty-icon">
          <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
            <rect x="4" y="10" width="32" height="22" rx="3" stroke="currentColor" stroke-width="1.5"/>
            <path d="M14 32 L12 36 M26 32 L28 36 M10 36 L30 36" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <path d="M4 16 L36 16" stroke="currentColor" stroke-width="1.5"/>
          </svg>
        </div>
        <p>Select a country above to see today's broadcast listings</p>
      </div>
      <div id="matches-container"></div>
    </main>

  </div>
  <script src="api.js"></script>
  <script src="data/broadcasters.js"></script>
  <script src="script.js"></script>
</body>
</html>
